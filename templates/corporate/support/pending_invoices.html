{% if pending_invoices %}
<div class="pending-invoices-information">
    <p class="support-section-header">
        <i class="fa fa-file-pdf-o"></i>
        Pending invoices for plan upgrades:
    </p>
    <table class="pending-invoices-table">
        <thead>
            <tr>
                <th>Invoice ID</th>
                <th>Plan Tier</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for invoice in pending_invoices %}
            <tr>
                <td>
                    <a target="_blank" rel="noopener noreferrer" href="https://dashboard.stripe.com/invoices/{{ invoice.stripe_invoice_id }}">
                        {{ invoice.stripe_invoice_id }}
                    </a>
                </td>
                <td>{{ invoice.plan_tier }}</td>
                <td>
                    <form method="POST" class="support-form" style="display: inline;">
                        <input type="hidden" name="realm_id" value="{{ realm.id }}" />
                        <input type="hidden" name="cancel_invoice_id" value="{{ invoice.stripe_invoice_id }}" />
                        <button type="submit" class="button" onclick="return confirm('Are you sure you want to cancel this invoice?');">
                            Cancel Invoice
                        </button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endif %}
